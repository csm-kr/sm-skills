interface:
  display_name: "쿠팡 상세페이지 10장 기획·생성"
  short_description: "웹 리서치와 직접 한글 조판으로 상세 이미지 10장 제작"
  default_prompt: "$coupang-detail-page를 사용해 한 번에 한 질문씩 온보딩하고 모든 번호 선택에 다른 답변하기를 넣어 주세요. 동일 제품과 여러 실제 상세페이지를 조사해 훅·본문·카드·캡션 패턴을 분석한 뒤, 장마다 3~6개 정보 구역과 모바일 16px 이상 타이포 체계로 800x2400 상세 이미지 10장을 한글 카피와 함께 생성·검수해 주세요. 입력 확인부터 N/10 생성·QA·납품까지 진행 상황을 적극적으로 중계해 주세요."
