interface:
  display_name: "쿠팡 상세페이지 기능 우선 설계"
  short_description: "R2P 근거 계보로 비중복 3~10장 제작"
  default_prompt: "$coupang-detail-page를 사용해 RAW·WEB_MATCH·실제 레퍼런스를 분리하고 RAW→REFERENCE→REASON→PROOF→PAGE 계보를 만들어 주세요. 가장 중요한 기능적 구매 이유와 근거를 디자인보다 먼저 확정하고, 고유 INFO_ID 하나가 구매 질문 하나에 답하도록 호환·실측·사양·구성품·사용법·관리·안전을 우선해 주세요. 반복 페이지를 삭제·병합해 필요한 3~10장(보통 5~8장)의 800x2400 상세페이지와 모션 TOP3를 기획해 주세요. plan-review.html의 전체 카피·프롬프트·폰트·자산 계보를 검토받고 소스 해시와 HTML SHA256이 모두 일치하는 별도 승인 뒤, 사용자가 고른 정적·GIF·영상 범위와 모션 ID만 제작해 주세요."
