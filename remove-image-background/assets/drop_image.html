<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ComfyUI 배경 제거</title>
  <style>
    :root { color-scheme: dark; --bg: #10131a; --panel: #1b202b; --line: #465068; --accent: #8cdbb4; --text: #f5f7fb; --muted: #aeb8ca; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at top, #20372e, var(--bg) 58%); color: var(--text); font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    main { width: min(660px, 100%); padding: 24px; border: 1px solid #354052; border-radius: 18px; background: var(--panel); box-shadow: 0 20px 65px rgb(0 0 0 / 30%); }
    h1 { margin: 0 0 7px; }
    p { color: var(--muted); }
    .drop-zone { min-height: 250px; display: grid; place-items: center; padding: 20px; border: 2px dashed var(--line); border-radius: 14px; text-align: center; cursor: pointer; overflow: hidden; transition: border-color .15s, background .15s; }
    .drop-zone.dragover { border-color: var(--accent); background: rgb(140 219 180 / 9%); }
    .drop-zone strong { display: block; margin-bottom: 6px; color: var(--text); }
    input { position: absolute; width: 1px; height: 1px; opacity: 0; }
    img { display: none; max-width: 100%; max-height: 430px; object-fit: contain; border-radius: 10px; }
    button { width: 100%; margin-top: 16px; padding: 13px; border: 0; border-radius: 11px; background: var(--accent); color: #102219; font: 700 15px inherit; cursor: pointer; }
    button:disabled { opacity: .55; cursor: wait; }
    #status { min-height: 22px; margin-bottom: 0; }
    #status.error { color: #ff9898; }
  </style>
</head>
<body>
  <main>
    <h1>이미지 배경 제거</h1>
    <p>이미지를 아래 영역에 드래그 앤 드롭하세요.</p>
    <label id="dropZone" class="drop-zone" for="imageInput">
      <span id="message"><strong>이미지를 여기에 드롭</strong>또는 클릭해서 파일 선택</span>
      <img id="preview" alt="배경 제거 입력 미리보기">
    </label>
    <input id="imageInput" type="file" accept="image/*">
    <button id="submit" type="button">이 이미지 배경 제거</button>
    <p id="status" role="status"></p>
  </main>
  <script>
    const submitUrl = "__SUBMIT_URL__";
    const dropZone = document.querySelector("#dropZone");
    const imageInput = document.querySelector("#imageInput");
    const message = document.querySelector("#message");
    const preview = document.querySelector("#preview");
    const submit = document.querySelector("#submit");
    const status = document.querySelector("#status");
    let imageFile = null;

    function setStatus(text, error = false) {
      status.textContent = text;
      status.classList.toggle("error", error);
    }
    function selectImage(file) {
      if (!file || !file.type.startsWith("image/")) return setStatus("이미지 파일을 선택해 주세요.", true);
      imageFile = file;
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
      message.style.display = "none";
      setStatus(`${file.name} 선택됨`);
    }
    ["dragenter", "dragover"].forEach((name) => dropZone.addEventListener(name, (event) => {
      event.preventDefault();
      dropZone.classList.add("dragover");
    }));
    ["dragleave", "drop"].forEach((name) => dropZone.addEventListener(name, (event) => {
      event.preventDefault();
      dropZone.classList.remove("dragover");
    }));
    dropZone.addEventListener("drop", (event) => selectImage(event.dataTransfer.files[0]));
    imageInput.addEventListener("change", () => selectImage(imageInput.files[0]));

    function toDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error("이미지를 읽지 못했습니다."));
        reader.readAsDataURL(file);
      });
    }
    submit.addEventListener("click", async () => {
      if (!imageFile) return setStatus("배경을 제거할 이미지를 넣어 주세요.", true);
      submit.disabled = true;
      setStatus("입력 폴더에 저장하고 있습니다…");
      try {
        const response = await fetch(submitUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image: { name: imageFile.name, data_url: await toDataUrl(imageFile) } }),
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || "저장에 실패했습니다.");
        submit.textContent = "입력 완료";
        setStatus("입력이 저장됐습니다. 이 창을 닫아도 됩니다.");
      } catch (error) {
        submit.disabled = false;
        setStatus(error.message, true);
      }
    });
  </script>
</body>
</html>
