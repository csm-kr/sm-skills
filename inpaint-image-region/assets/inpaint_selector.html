<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ComfyUI 영역 인페인팅</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1017;
      --panel: #171b25;
      --panel-strong: #1d2230;
      --line: #30384b;
      --accent: #8ba4ff;
      --accent-strong: #6e8eff;
      --text: #f5f7fc;
      --muted: #a8b0c3;
      --danger: #ff9898;
      --success: #77ddb2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 0, #222c49 0, var(--bg) 42%);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    main { width: min(1320px, calc(100% - 32px)); margin: 28px auto 48px; }
    h1 { margin: 0 0 6px; font-size: clamp(25px, 3vw, 36px); letter-spacing: -.03em; }
    h2 { margin: 0; font-size: 16px; }
    .lead { margin: 0 0 22px; color: var(--muted); }
    .top-grid, .workspace-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .workspace-grid { margin-top: 16px; align-items: start; }
    .panel {
      min-width: 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: color-mix(in srgb, var(--panel) 95%, transparent);
      box-shadow: 0 18px 50px rgb(0 0 0 / 20%);
    }
    .panel-heading { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .tag { color: var(--muted); font-size: 12px; }
    textarea {
      width: 100%;
      min-height: 128px;
      resize: vertical;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 11px;
      outline: none;
      background: #10131b;
      color: var(--text);
      font: inherit;
      line-height: 1.5;
    }
    textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgb(139 164 255 / 12%); }
    textarea[readonly] { color: #dfe5ff; background: #111722; }
    .drop-zone {
      min-height: 128px;
      display: grid;
      place-items: center;
      padding: 16px;
      border: 1.5px dashed #536078;
      border-radius: 12px;
      text-align: center;
      color: var(--muted);
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .drop-zone.compact { min-height: 92px; }
    .drop-zone.dragover { border-color: var(--accent); background: rgb(139 164 255 / 9%); }
    .drop-zone strong { display: block; margin-bottom: 4px; color: var(--text); }
    .file-input { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    .reference-content { display: grid; grid-template-columns: minmax(0, 1fr); gap: 10px; }
    .reference-preview { display: none; width: 100%; height: 128px; object-fit: contain; border-radius: 10px; background: #0b0d12; }
    .mode, .hint { margin: 9px 0 0; color: var(--muted); font-size: 13px; }
    .ai-panel { margin-top: 16px; background: linear-gradient(135deg, rgb(29 34 48 / 98%), rgb(24 29 40 / 98%)); }
    .ai-grid { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; align-items: stretch; }
    .ai-grid textarea { min-height: 86px; resize: none; }
    .button-stack { display: grid; width: 190px; gap: 9px; }
    button {
      padding: 11px 15px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #0b1020;
      font: 700 14px inherit;
      cursor: pointer;
      transition: transform .12s, opacity .12s, background .12s;
    }
    button:hover:not(:disabled) { transform: translateY(-1px); background: #9cb2ff; }
    button:disabled { opacity: .42; cursor: not-allowed; }
    .secondary-button { border: 1px solid var(--line); background: #272e3f; color: var(--text); }
    .secondary-button:hover:not(:disabled) { background: #313a50; }
    .execute-button { background: var(--success); color: #092119; }
    .execute-button:hover:not(:disabled) { background: #8be8c2; }
    .canvas-wrap {
      display: none;
      overflow: auto;
      max-height: 70vh;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #090b10;
      overscroll-behavior: contain;
    }
    canvas { display: block; width: 100%; height: auto; touch-action: none; cursor: crosshair; }
    .zoom-line { display: flex; justify-content: space-between; gap: 12px; }
    .comparison-placeholder {
      min-height: 320px;
      display: grid;
      place-items: center;
      padding: 24px;
      border: 1px dashed var(--line);
      border-radius: 12px;
      color: var(--muted);
      text-align: center;
      background: #0b0e14;
    }
    .comparison { display: none; }
    .compare-stage {
      position: relative;
      width: 100%;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #090b10;
    }
    .compare-stage img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; user-select: none; pointer-events: none; }
    #afterImage { clip-path: inset(0 50% 0 0); }
    .compare-divider { position: absolute; z-index: 2; top: 0; bottom: 0; left: 50%; width: 2px; transform: translateX(-1px); background: #fff; box-shadow: 0 0 0 1px rgb(0 0 0 / 35%); pointer-events: none; }
    .compare-divider::after { content: "↔"; position: absolute; top: 50%; left: 50%; display: grid; width: 34px; height: 34px; place-items: center; transform: translate(-50%, -50%); border-radius: 50%; background: #fff; color: #161b26; font-weight: 800; }
    .compare-label { position: absolute; z-index: 3; top: 10px; padding: 5px 8px; border-radius: 7px; background: rgb(8 10 15 / 72%); color: #fff; font-size: 12px; pointer-events: none; }
    .compare-label.before { left: 10px; }
    .compare-label.after { right: 10px; }
    .compare-slider { width: 100%; margin: 14px 0 5px; accent-color: var(--accent); cursor: ew-resize; }
    .result-actions { display: flex; justify-content: flex-end; margin-top: 12px; }
    .close-button { display: none; background: #30384b; color: var(--text); }
    #status { min-height: 20px; margin: 10px 0 0; color: var(--muted); font-size: 13px; }
    #status.error { color: var(--danger); }
    @media (max-width: 860px) {
      .top-grid, .workspace-grid { grid-template-columns: 1fr; }
      .ai-grid { grid-template-columns: 1fr; }
      .button-stack { width: 100%; grid-template-columns: 1fr 1fr; }
      #execute { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <main>
    <h1>영역 인페인팅</h1>
    <p class="lead">이미지에서 바꿀 영역을 그리고, 짧게 원하는 결과를 알려주세요.</p>

    <div class="top-grid">
      <section class="panel">
        <div class="panel-heading"><h2>변경할 내용</h2><span class="tag">필수</span></div>
        <textarea id="prompt" placeholder="예: 선택한 모자를 자연스러운 대머리로 바꿔줘"></textarea>
      </section>

      <section class="panel">
        <div class="panel-heading"><h2>레퍼런스 이미지 (선택)</h2><span id="modeText" class="tag">텍스트 전용</span></div>
        <div class="reference-content">
          <label id="referenceDrop" class="drop-zone compact" for="referenceInput">
            <span><strong>레퍼런스를 여기에 드롭</strong>비워두면 텍스트만 사용합니다.</span>
          </label>
          <input id="referenceInput" class="file-input" type="file" accept="image/*">
          <img id="referencePreview" class="reference-preview" alt="선택한 레퍼런스 미리보기">
        </div>
      </section>
    </div>

    <section class="panel ai-panel">
      <div class="panel-heading"><h2>보강된 프롬프트 (AI)</h2><span class="tag">선택 영역에 들어갈 결과만 짧게 생성</span></div>
      <div class="ai-grid">
        <textarea id="enhancedPromptInput" readonly placeholder="AI 프롬프트 만들기를 누르면 여기에 표시됩니다."></textarea>
        <div class="button-stack">
          <button id="submit" type="button">AI 프롬프트 만들기</button>
          <button id="regenerate" class="secondary-button" type="button" disabled>다시 만들기</button>
          <button id="execute" class="execute-button" type="button" disabled>바로 인페인팅 실행</button>
        </div>
      </div>
      <p class="hint">Agent가 영어 프롬프트를 번역·보강합니다. 실행 버튼은 현재 보강된 프롬프트를 그대로 사용합니다.</p>
      <p id="status" role="status"></p>
    </section>

    <div class="workspace-grid">
      <section class="panel">
        <div class="panel-heading"><h2>원본</h2><span id="zoomText" class="tag">100%</span></div>
        <label id="sourceDrop" class="drop-zone" for="sourceInput">
          <span><strong>원본 이미지를 여기에 드롭</strong>또는 클릭해서 파일을 선택하세요.</span>
        </label>
        <input id="sourceInput" class="file-input" type="file" accept="image/*">
        <div id="canvasWrap" class="canvas-wrap"><canvas id="selector"></canvas></div>
        <p class="hint zoom-line"><span id="boxText">이미지를 넣은 뒤 바꿀 영역을 드래그하세요.</span><span>휠: 확대·축소</span></p>
      </section>

      <section class="panel">
        <div class="panel-heading"><h2>결과</h2><span class="tag">슬라이더로 원본과 비교</span></div>
        <div id="comparisonPlaceholder" class="comparison-placeholder">실행이 끝나면 원본과 결과를 이 자리에서 비교할 수 있습니다.</div>
        <div id="comparison" class="comparison">
          <div id="compareStage" class="compare-stage">
            <img id="beforeImage" alt="원본 이미지">
            <img id="afterImage" alt="인페인팅 결과">
            <span class="compare-label before">원본</span>
            <span class="compare-label after">결과</span>
            <div id="compareDivider" class="compare-divider"></div>
          </div>
          <input id="compareSlider" class="compare-slider" type="range" min="0" max="100" value="50" aria-label="원본과 결과 비교">
          <div class="result-actions"><button id="close" class="close-button" type="button">완료하고 창 닫기</button></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const submitUrl = "__SUBMIT_URL__";
    const statusUrl = "__STATUS_URL__";
    const regenerateUrl = "__REGENERATE_URL__";
    const executeUrl = "__EXECUTE_URL__";
    const closeUrl = "__CLOSE_URL__";
    const sourceDrop = document.querySelector("#sourceDrop");
    const referenceDrop = document.querySelector("#referenceDrop");
    const sourceInput = document.querySelector("#sourceInput");
    const referenceInput = document.querySelector("#referenceInput");
    const canvasWrap = document.querySelector("#canvasWrap");
    const canvas = document.querySelector("#selector");
    const context = canvas.getContext("2d");
    const promptInput = document.querySelector("#prompt");
    const enhancedPromptInput = document.querySelector("#enhancedPromptInput");
    const boxText = document.querySelector("#boxText");
    const zoomText = document.querySelector("#zoomText");
    const modeText = document.querySelector("#modeText");
    const referencePreview = document.querySelector("#referencePreview");
    const submitButton = document.querySelector("#submit");
    const regenerateButton = document.querySelector("#regenerate");
    const executeButton = document.querySelector("#execute");
    const closeButton = document.querySelector("#close");
    const statusText = document.querySelector("#status");
    const comparisonPlaceholder = document.querySelector("#comparisonPlaceholder");
    const comparison = document.querySelector("#comparison");
    const compareStage = document.querySelector("#compareStage");
    const beforeImage = document.querySelector("#beforeImage");
    const afterImage = document.querySelector("#afterImage");
    const compareSlider = document.querySelector("#compareSlider");
    const compareDivider = document.querySelector("#compareDivider");

    let sourceFile = null;
    let sourceImage = null;
    let sourceObjectUrl = null;
    let referenceFile = null;
    let referenceObjectUrl = null;
    let box = null;
    let start = null;
    let zoom = 1;
    let pollTimer = null;

    function setStatus(message, isError = false) {
      statusText.textContent = message;
      statusText.classList.toggle("error", isError);
    }

    function imageFile(file) {
      return file && file.type.startsWith("image/");
    }

    function installDropZone(element, input, receive) {
      ["dragenter", "dragover"].forEach((eventName) => {
        element.addEventListener(eventName, (event) => {
          event.preventDefault();
          element.classList.add("dragover");
        });
      });
      ["dragleave", "drop"].forEach((eventName) => {
        element.addEventListener(eventName, (event) => {
          event.preventDefault();
          element.classList.remove("dragover");
        });
      });
      element.addEventListener("drop", (event) => receive(event.dataTransfer.files[0]));
      input.addEventListener("change", () => receive(input.files[0]));
    }

    function resetResult() {
      comparison.style.display = "none";
      comparisonPlaceholder.style.display = "grid";
      afterImage.removeAttribute("src");
      closeButton.style.display = "none";
    }

    function resetEnhancedPrompt() {
      enhancedPromptInput.value = "";
      regenerateButton.disabled = true;
      executeButton.disabled = true;
      resetResult();
    }

    function loadSource(file) {
      if (!imageFile(file)) return setStatus("원본 이미지 파일을 선택해 주세요.", true);
      if (sourceObjectUrl) URL.revokeObjectURL(sourceObjectUrl);
      sourceObjectUrl = URL.createObjectURL(file);
      const image = new Image();
      image.onload = () => {
        sourceFile = file;
        sourceImage = image;
        box = null;
        canvas.width = image.naturalWidth;
        canvas.height = image.naturalHeight;
        zoom = 1;
        canvas.style.width = "100%";
        zoomText.textContent = "100%";
        canvasWrap.style.display = "block";
        sourceDrop.style.display = "none";
        beforeImage.src = sourceObjectUrl;
        compareStage.style.aspectRatio = `${image.naturalWidth} / ${image.naturalHeight}`;
        draw();
        resetEnhancedPrompt();
        boxText.textContent = "바꿀 영역을 이미지 위에서 드래그하세요.";
        setStatus("");
      };
      image.src = sourceObjectUrl;
    }

    function loadReference(file) {
      if (!imageFile(file)) return setStatus("레퍼런스 이미지 파일을 선택해 주세요.", true);
      if (referenceObjectUrl) URL.revokeObjectURL(referenceObjectUrl);
      referenceObjectUrl = URL.createObjectURL(file);
      referenceFile = file;
      referencePreview.src = referenceObjectUrl;
      referencePreview.style.display = "block";
      referenceDrop.querySelector("span").innerHTML = `<strong>${file.name}</strong>다른 이미지를 드롭하면 교체됩니다.`;
      modeText.textContent = "레퍼런스 + 텍스트";
      resetEnhancedPrompt();
      setStatus("");
    }

    function canvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return [
        Math.max(0, Math.min(canvas.width, (event.clientX - rect.left) * canvas.width / rect.width)),
        Math.max(0, Math.min(canvas.height, (event.clientY - rect.top) * canvas.height / rect.height)),
      ];
    }

    function normalizedBox(points) {
      const [x1, y1, x2, y2] = points;
      return [Math.min(x1, x2), Math.min(y1, y2), Math.max(x1, x2), Math.max(y1, y2)].map(Math.round);
    }

    function draw(previewBox = box) {
      if (!sourceImage) return;
      context.clearRect(0, 0, canvas.width, canvas.height);
      context.drawImage(sourceImage, 0, 0);
      if (!previewBox) return;
      const [x1, y1, x2, y2] = normalizedBox(previewBox);
      context.fillStyle = "rgba(139, 164, 255, .2)";
      context.strokeStyle = "#8ba4ff";
      context.lineWidth = Math.max(3, canvas.width / 350);
      context.fillRect(x1, y1, x2 - x1, y2 - y1);
      context.strokeRect(x1, y1, x2 - x1, y2 - y1);
    }

    canvas.addEventListener("pointerdown", (event) => {
      if (!sourceImage) return;
      canvas.setPointerCapture(event.pointerId);
      start = canvasPoint(event);
    });
    canvas.addEventListener("pointermove", (event) => {
      if (start) draw([...start, ...canvasPoint(event)]);
    });
    canvas.addEventListener("pointerup", (event) => {
      if (!start) return;
      box = normalizedBox([...start, ...canvasPoint(event)]);
      start = null;
      draw();
      resetEnhancedPrompt();
      boxText.textContent = `선택 좌표: ${box.join(", ")} · 다시 드래그하면 교체`;
    });
    canvas.addEventListener("wheel", (event) => {
      if (!sourceImage) return;
      event.preventDefault();
      const oldRect = canvas.getBoundingClientRect();
      const wrapRect = canvasWrap.getBoundingClientRect();
      const cursorX = event.clientX - wrapRect.left;
      const cursorY = event.clientY - wrapRect.top;
      const nextZoom = Math.max(.5, Math.min(4, zoom * (event.deltaY < 0 ? 1.15 : .87)));
      if (nextZoom === zoom) return;
      zoom = nextZoom;
      canvas.style.width = `${zoom * 100}%`;
      zoomText.textContent = `${Math.round(zoom * 100)}%`;
      requestAnimationFrame(() => {
        const ratio = canvas.getBoundingClientRect().width / oldRect.width;
        canvasWrap.scrollLeft = (canvasWrap.scrollLeft + cursorX) * ratio - cursorX;
        canvasWrap.scrollTop = (canvasWrap.scrollTop + cursorY) * ratio - cursorY;
      });
    }, { passive: false });

    function toDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error("이미지를 읽지 못했습니다."));
        reader.readAsDataURL(file);
      });
    }

    function validateInput() {
      if (!sourceFile) return "원본 이미지를 넣어 주세요.";
      if (!box || box[2] - box[0] < 2 || box[3] - box[1] < 2) return "바꿀 영역을 드래그해 주세요.";
      if (!promptInput.value.trim()) return "변경할 내용을 입력해 주세요.";
      return null;
    }

    function schedulePoll() {
      window.clearTimeout(pollTimer);
      pollTimer = window.setTimeout(pollStatus, 700);
    }

    async function pollStatus() {
      try {
        const response = await fetch(statusUrl, { cache: "no-store" });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || "실행 상태를 확인하지 못했습니다.");
        if (result.enhanced_prompt) enhancedPromptInput.value = result.enhanced_prompt;
        if (result.state === "waiting_agent") {
          setStatus("Agent가 선택 영역용 영어 프롬프트를 만들고 있습니다…");
          schedulePoll();
        } else if (result.state === "ready") {
          submitButton.disabled = false;
          regenerateButton.disabled = false;
          executeButton.disabled = false;
          setStatus("보강된 프롬프트가 준비됐습니다. 확인 후 실행하세요.");
        } else if (result.state === "running") {
          setStatus("현재 보강된 프롬프트로 ComfyUI를 실행하고 있습니다…");
          schedulePoll();
        } else if (result.state === "complete") {
          submitButton.disabled = false;
          regenerateButton.disabled = false;
          executeButton.disabled = false;
          afterImage.src = result.result_data_url;
          afterImage.alt = result.result_name;
          comparisonPlaceholder.style.display = "none";
          comparison.style.display = "block";
          closeButton.style.display = "inline-block";
          setStatus(`${result.result_name} 생성 완료`);
        } else if (result.state === "error") {
          throw new Error(result.error || "인페인팅 실행에 실패했습니다.");
        }
      } catch (error) {
        submitButton.disabled = false;
        regenerateButton.disabled = !enhancedPromptInput.value;
        executeButton.disabled = !enhancedPromptInput.value;
        setStatus(error.message, true);
      }
    }

    submitButton.addEventListener("click", async () => {
      const validationError = validateInput();
      if (validationError) return setStatus(validationError, true);
      submitButton.disabled = true;
      regenerateButton.disabled = true;
      executeButton.disabled = true;
      enhancedPromptInput.value = "";
      resetResult();
      setStatus("입력을 저장하고 Agent에게 프롬프트 생성을 요청하고 있습니다…");
      try {
        const payload = {
          source: { name: sourceFile.name, data_url: await toDataUrl(sourceFile) },
          reference: referenceFile ? { name: referenceFile.name, data_url: await toDataUrl(referenceFile) } : null,
          prompt: promptInput.value,
          box,
        };
        const response = await fetch(submitUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || "입력 제출에 실패했습니다.");
        schedulePoll();
      } catch (error) {
        submitButton.disabled = false;
        setStatus(error.message, true);
      }
    });

    regenerateButton.addEventListener("click", async () => {
      regenerateButton.disabled = true;
      executeButton.disabled = true;
      setStatus("Agent에게 다른 보강 프롬프트를 요청하고 있습니다…");
      try {
        const response = await fetch(regenerateUrl, { method: "POST" });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || "다시 만들기 요청에 실패했습니다.");
        schedulePoll();
      } catch (error) {
        regenerateButton.disabled = false;
        executeButton.disabled = false;
        setStatus(error.message, true);
      }
    });

    executeButton.addEventListener("click", async () => {
      executeButton.disabled = true;
      regenerateButton.disabled = true;
      submitButton.disabled = true;
      resetResult();
      setStatus("현재 보강된 프롬프트로 ComfyUI 실행을 시작합니다…");
      try {
        const request = fetch(executeUrl, { method: "POST" });
        schedulePoll();
        const response = await request;
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || "인페인팅 실행에 실패했습니다.");
        pollStatus();
      } catch (error) {
        submitButton.disabled = false;
        regenerateButton.disabled = false;
        executeButton.disabled = false;
        setStatus(error.message, true);
      }
    });

    compareSlider.addEventListener("input", () => {
      const value = Number(compareSlider.value);
      afterImage.style.clipPath = `inset(0 ${100 - value}% 0 0)`;
      compareDivider.style.left = `${value}%`;
    });

    closeButton.addEventListener("click", async () => {
      closeButton.disabled = true;
      try {
        await fetch(closeUrl, { method: "POST" });
        closeButton.textContent = "닫아도 됩니다";
        setStatus("결과가 저장됐습니다. 이 창을 닫아도 됩니다.");
      } catch (error) {
        closeButton.disabled = false;
        setStatus(error.message, true);
      }
    });

    promptInput.addEventListener("input", resetEnhancedPrompt);
    installDropZone(sourceDrop, sourceInput, loadSource);
    installDropZone(referenceDrop, referenceInput, loadReference);
  </script>
</body>
</html>
