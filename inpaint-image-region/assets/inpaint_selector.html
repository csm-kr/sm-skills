<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ComfyUI 영역 인페인팅</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #11131a;
      --panel: #1a1e29;
      --line: #343b4f;
      --accent: #7c9cff;
      --text: #f2f4fb;
      --muted: #aeb6cc;
      --danger: #ff8f8f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #202943 0, var(--bg) 52%);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    main { width: min(1180px, calc(100% - 32px)); margin: 32px auto; }
    h1 { margin: 0 0 8px; font-size: clamp(25px, 4vw, 38px); }
    .lead { margin: 0 0 24px; color: var(--muted); }
    .layout { display: grid; grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr); gap: 18px; }
    .panel {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: color-mix(in srgb, var(--panel) 94%, transparent);
      box-shadow: 0 18px 55px rgb(0 0 0 / 24%);
    }
    h2 { margin: 0 0 12px; font-size: 17px; }
    .drop-zone {
      min-height: 130px;
      display: grid;
      place-items: center;
      padding: 18px;
      border: 2px dashed #4d5873;
      border-radius: 13px;
      text-align: center;
      color: var(--muted);
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .drop-zone.dragover { border-color: var(--accent); background: rgb(124 156 255 / 10%); }
    .drop-zone strong { display: block; color: var(--text); margin-bottom: 5px; }
    .file-input { position: absolute; width: 1px; height: 1px; opacity: 0; }
    .canvas-wrap {
      display: none;
      margin-top: 14px;
      overflow: auto;
      max-height: 68vh;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #0b0d12;
    }
    canvas { display: block; width: 100%; height: auto; touch-action: none; cursor: crosshair; }
    .hint { margin: 10px 0 0; color: var(--muted); font-size: 13px; }
    .stack { display: grid; gap: 18px; }
    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #11141d;
      color: var(--text);
      font: inherit;
    }
    .reference-preview { display: none; width: 100%; max-height: 230px; object-fit: contain; margin-top: 12px; border-radius: 10px; background: #0b0d12; }
    .mode { margin: 10px 0 0; color: var(--muted); font-size: 13px; }
    button {
      width: 100%;
      padding: 13px 16px;
      border: 0;
      border-radius: 11px;
      background: var(--accent);
      color: #0c1020;
      font: 700 15px inherit;
      cursor: pointer;
    }
    button:disabled { opacity: .55; cursor: wait; }
    #status { min-height: 22px; margin: 10px 0 0; color: var(--muted); }
    #status.error { color: var(--danger); }
    @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <h1>영역 인페인팅</h1>
    <p class="lead">원본에서 바꿀 영역을 드래그하고, 원하는 결과를 텍스트로 설명하세요.</p>
    <div class="layout">
      <section class="panel">
        <h2>1. 원본 이미지와 변경 영역</h2>
        <label id="sourceDrop" class="drop-zone" for="sourceInput">
          <span><strong>원본 이미지를 여기에 드롭</strong>또는 클릭해서 파일 선택</span>
        </label>
        <input id="sourceInput" class="file-input" type="file" accept="image/*">
        <div id="canvasWrap" class="canvas-wrap">
          <canvas id="selector"></canvas>
        </div>
        <p id="boxText" class="hint">이미지를 넣은 뒤 바꿀 영역을 한 번 드래그하세요.</p>
      </section>

      <div class="stack">
        <section class="panel">
          <h2>2. 변경할 내용</h2>
          <textarea id="prompt" placeholder="예: 선택한 셔츠를 짙은 파란색 데님 재킷으로 바꿔줘"></textarea>
        </section>

        <section class="panel">
          <h2>3. 레퍼런스 이미지 (선택)</h2>
          <label id="referenceDrop" class="drop-zone" for="referenceInput">
            <span><strong>레퍼런스를 쓰려면 여기에 드롭</strong>비워두면 텍스트만 사용</span>
          </label>
          <input id="referenceInput" class="file-input" type="file" accept="image/*">
          <img id="referencePreview" class="reference-preview" alt="선택한 레퍼런스 미리보기">
          <p id="modeText" class="mode">현재 모드: 텍스트 전용</p>
        </section>

        <section class="panel">
          <button id="submit" type="button">선택 내용으로 인페인팅 준비</button>
          <p id="status" role="status"></p>
        </section>
      </div>
    </div>
  </main>

  <script>
    const submitUrl = "__SUBMIT_URL__";
    const sourceDrop = document.querySelector("#sourceDrop");
    const referenceDrop = document.querySelector("#referenceDrop");
    const sourceInput = document.querySelector("#sourceInput");
    const referenceInput = document.querySelector("#referenceInput");
    const canvasWrap = document.querySelector("#canvasWrap");
    const canvas = document.querySelector("#selector");
    const context = canvas.getContext("2d");
    const prompt = document.querySelector("#prompt");
    const boxText = document.querySelector("#boxText");
    const modeText = document.querySelector("#modeText");
    const referencePreview = document.querySelector("#referencePreview");
    const submitButton = document.querySelector("#submit");
    const status = document.querySelector("#status");

    let sourceFile = null;
    let sourceImage = null;
    let referenceFile = null;
    let box = null;
    let start = null;

    function setStatus(message, isError = false) {
      status.textContent = message;
      status.classList.toggle("error", isError);
    }

    function imageFile(file) {
      return file && file.type.startsWith("image/");
    }

    function installDropZone(element, input, receive) {
      ["dragenter", "dragover"].forEach((eventName) => {
        element.addEventListener(eventName, (event) => {
          event.preventDefault();
          element.classList.add("dragover");
        });
      });
      ["dragleave", "drop"].forEach((eventName) => {
        element.addEventListener(eventName, (event) => {
          event.preventDefault();
          element.classList.remove("dragover");
        });
      });
      element.addEventListener("drop", (event) => receive(event.dataTransfer.files[0]));
      input.addEventListener("change", () => receive(input.files[0]));
    }

    function loadSource(file) {
      if (!imageFile(file)) {
        setStatus("원본 이미지 파일을 선택해 주세요.", true);
        return;
      }
      const image = new Image();
      image.onload = () => {
        sourceFile = file;
        sourceImage = image;
        box = null;
        canvas.width = image.naturalWidth;
        canvas.height = image.naturalHeight;
        canvasWrap.style.display = "block";
        sourceDrop.querySelector("span").innerHTML = `<strong>${file.name}</strong>다른 원본을 드롭하면 교체됩니다.`;
        draw();
        boxText.textContent = "바꿀 영역을 이미지 위에서 드래그하세요.";
        setStatus("");
        URL.revokeObjectURL(image.src);
      };
      image.src = URL.createObjectURL(file);
    }

    function loadReference(file) {
      if (!imageFile(file)) {
        setStatus("레퍼런스 이미지 파일을 선택해 주세요.", true);
        return;
      }
      referenceFile = file;
      referencePreview.src = URL.createObjectURL(file);
      referencePreview.style.display = "block";
      referenceDrop.querySelector("span").innerHTML = `<strong>${file.name}</strong>다른 이미지를 드롭하면 교체됩니다.`;
      modeText.textContent = "현재 모드: 레퍼런스 + 텍스트";
      setStatus("");
    }

    function canvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return [
        Math.max(0, Math.min(canvas.width, (event.clientX - rect.left) * canvas.width / rect.width)),
        Math.max(0, Math.min(canvas.height, (event.clientY - rect.top) * canvas.height / rect.height)),
      ];
    }

    function normalizedBox(points) {
      const [x1, y1, x2, y2] = points;
      return [Math.min(x1, x2), Math.min(y1, y2), Math.max(x1, x2), Math.max(y1, y2)].map(Math.round);
    }

    function draw(previewBox = box) {
      if (!sourceImage) return;
      context.clearRect(0, 0, canvas.width, canvas.height);
      context.drawImage(sourceImage, 0, 0);
      if (!previewBox) return;
      const [x1, y1, x2, y2] = normalizedBox(previewBox);
      context.fillStyle = "rgba(124, 156, 255, .22)";
      context.strokeStyle = "#7c9cff";
      context.lineWidth = Math.max(3, canvas.width / 350);
      context.fillRect(x1, y1, x2 - x1, y2 - y1);
      context.strokeRect(x1, y1, x2 - x1, y2 - y1);
    }

    canvas.addEventListener("pointerdown", (event) => {
      if (!sourceImage) return;
      canvas.setPointerCapture(event.pointerId);
      start = canvasPoint(event);
    });
    canvas.addEventListener("pointermove", (event) => {
      if (!start) return;
      draw([...start, ...canvasPoint(event)]);
    });
    canvas.addEventListener("pointerup", (event) => {
      if (!start) return;
      box = normalizedBox([...start, ...canvasPoint(event)]);
      start = null;
      draw();
      boxText.textContent = `선택 좌표: ${box.join(", ")} (다시 드래그하면 교체)`;
    });

    function toDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error("이미지를 읽지 못했습니다."));
        reader.readAsDataURL(file);
      });
    }

    submitButton.addEventListener("click", async () => {
      if (!sourceFile) return setStatus("원본 이미지를 넣어 주세요.", true);
      if (!box || box[2] - box[0] < 2 || box[3] - box[1] < 2) return setStatus("바꿀 영역을 드래그해 주세요.", true);
      if (!prompt.value.trim()) return setStatus("변경할 내용을 입력해 주세요.", true);
      submitButton.disabled = true;
      setStatus("이미지를 저장하고 있습니다…");
      try {
        const payload = {
          source: { name: sourceFile.name, data_url: await toDataUrl(sourceFile) },
          reference: referenceFile ? { name: referenceFile.name, data_url: await toDataUrl(referenceFile) } : null,
          prompt: prompt.value,
          box,
        };
        const response = await fetch(submitUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || "저장에 실패했습니다.");
        setStatus(referenceFile ? "레퍼런스 모드로 준비했습니다. 이 창을 닫아도 됩니다." : "텍스트 전용 모드로 준비했습니다. 이 창을 닫아도 됩니다.");
        submitButton.textContent = "준비 완료";
      } catch (error) {
        submitButton.disabled = false;
        setStatus(error.message, true);
      }
    });

    installDropZone(sourceDrop, sourceInput, loadSource);
    installDropZone(referenceDrop, referenceInput, loadReference);
  </script>
</body>
</html>
